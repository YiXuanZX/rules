pr: &pr {type: select, url: https://www.gstatic.com/generate_204, interval: 600, lazy: false}
select: &select {type: select, url: https://www.gstatic.com/generate_204, interval: 600, lazy: false, include-all: true}
p: &p {type: http, interval: 86400, proxy: DIRECT, header: {User-Agent: ["clash-verge/v2.4.7"]}, health-check: {enable: true, url: https://www.gstatic.com/generate_204, interval: 600, lazy: false}}

proxy-providers:
  provider1:
    <<: *p
    url: "此处填入订阅"
    path: ./proxy_providers/provider1.yaml

proxies:
  - name: IPv4优先
    type: direct
    ip-version: ipv4-prefer
  - name: IPv6优先
    type: direct
    ip-version: ipv6-prefer
  - name: 双栈
    type: direct

mixed-port: 7890
redir-port: 7891
tproxy-port: 7892
log-level: error
ipv6: true
allow-lan: true

external-controller: "[::]:9090"
external-ui: ui
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist-cdn-fonts.zip"

unified-delay: true
tcp-concurrent: true
find-process-mode: off

keep-alive-idle: 300
keep-alive-interval: 75

profile:
  store-selected: true
  store-fake-ip: true

tun:
  enable: true
  stack: gvisor
  mtu: 1500
  device: nikki
  dns-hijack:
    - "udp://any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  disable-icmp-forwarding: true

dns:
  enable: true
  ipv6: true
  cache-algorithm: arc
  listen: "[::]:1053"
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "+.market.xiaomi.com"
    - "lancache.steamcontent.com"
    - "rule-set:private"
  default-nameserver:
    - https://223.6.6.6/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
  nameserver:
    #- https://dns.alidns.com/dns-query
    - https://mosdns.apad.pro/api-query#ecs=192.168.1.0/24
  nameserver-policy:
    "rule-set:private": [system]
    "rule-set:china-list,cn": [dns.alidns.com]
    "rule-set:gfw": [https://dns.google/dns-query#代理]

hosts:
  dns.alidns.com: [223.5.5.5, 223.6.6.6]
  dns.google: [8.8.8.8, 8.8.4.4]
  mosdns.apad.pro: 117.50.76.202

proxy-groups:
  - {name: 香港, <<: *select, filter: "(?i)香港|hk", icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Hong_Kong.png"}
  - {name: 新加坡, <<: *select, filter: "(?i)新加坡|sg", icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Singapore.png"}
  - {name: 日本, <<: *select, filter: "(?i)日本|jp", icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Japan.png"}
  - {name: 美国, <<: *select, filter: "(?i)美国|us", icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/United_States.png"}
  - {name: 欧洲, <<: *select, filter: "(?i)英国|法国|德国|荷兰|uk|fr|de|nl", icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/European_Union.png"}
  - {name: 其他, <<: *select, exclude-filter: "(?i)优先|双栈|剩余|到期|香港|hk|新加坡|sg|日本|jp|美国|us|英国|法国|德国|荷兰|uk|fr|de|nl", icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/United_Nations.png"}

  - {name: 代理, <<: *pr, proxies: [日本, 香港, 新加坡, 美国, 欧洲, 其他], icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/World_Map.png"}
  - {name: 直连, type: select, proxies: [IPv4优先, IPv6优先, 双栈], url: https://connectivitycheck.platform.hicloud.com/generate_204, interval: 600, lazy: false, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/China_Map.png"}
  - {name: AI, <<: *pr, proxies: [日本, 香港, 新加坡, 美国, 欧洲, 其他], icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/ChatGPT.png"}
  - {name: TG, <<: *pr, proxies: [新加坡, 日本, 香港, 美国, 欧洲, 其他], icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Telegram.png"}
  - {name: GLOBAL, <<: *pr, proxies: [香港, 新加坡, 日本, 美国, 欧洲, 其他, 代理, 直连, AI, TG], icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Global.png"}

rules:
  - AND,((NETWORK,UDP),(DST-PORT,443),(RULE-SET,youtube)),REJECT  #屏蔽Youtube quic流量
  - DOMAIN,abyss.cyapi.cn,REJECT  #彩云天气去广告(以下三条)
  - DOMAIN,ad.cyapi.cn,REJECT
  - DOMAIN,gather.colorfulclouds.net,REJECT
  - DOMAIN,a.nel.cloudflare.com,直连  #Cloudflare人机验证直连(以下四条)
  - DOMAIN,challenges.cloudflare.com,直连
  - DOMAIN,stun.cloudflare.com,直连
  - DOMAIN,static.cloudflareinsights.com,直连
  - RULE-SET,private,直连
  - RULE-SET,private_ip,直连,no-resolve
  - RULE-SET,ai,AI
  - RULE-SET,telegram,TG
  - RULE-SET,telegram_ip,TG,no-resolve
  - RULE-SET,github,代理
  - RULE-SET,twitter,代理
  - RULE-SET,youtube,代理
  - RULE-SET,google,代理
  - RULE-SET,gfw,代理
  - RULE-SET,cn,直连
  - RULE-SET,cn_ip,直连
  - MATCH,代理

rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs, proxy: 代理}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs, proxy: 代理}
rule-providers:
  private:
    <<: *domain
    path: ./rule_providers/private.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"
  private_ip:
    <<: *ip
    path: ./rule_providers/private_ip.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.mrs"
  ai:
    <<: *domain
    path: ./rule_providers/ai.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ai-!cn.mrs"
  telegram:
    <<: *domain
    path: ./rule_providers/telegram.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/telegram.mrs"
  telegram_ip:
    <<: *ip
    path: ./rule_providers/telegram_ip.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/telegram.mrs"
  github:
    <<: *domain
    path: ./rule_providers/github.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/github.mrs"
  twitter:
    <<: *domain
    path: ./rule_providers/twitter.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/twitter.mrs"
  youtube:
    <<: *domain
    path: ./rule_providers/youtube.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/youtube.mrs"
  google:
    <<: *domain
    path: ./rule_providers/google.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google.mrs"
  gfw:
    <<: *domain
    path: ./rule_providers/gfw.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/gfw.mrs"
  china-list:
    <<: *domain
    path: ./rule_providers/china-list.mrs
    url: "https://raw.githubusercontent.com/wwqgtxx/clash-rules/release/direct.mrs"
  cn:
    <<: *domain
    path: ./rule_providers/cn.mrs
    url: "https://static-file-global.353355.xyz/rules/cn-additional-list.mrs"
  cn_ip:
    <<: *ip
    path: ./rule_providers/cn_ip.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs"